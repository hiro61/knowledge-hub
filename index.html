<!DOCTYPE html>
<html lang="ja" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Knowledge Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .float-up { animation: floatUp 0.4s ease forwards; opacity: 0; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    * { -webkit-tap-highlight-color: transparent; }
  </style>
  <script>
    (function () {
      const saved = localStorage.getItem('darkMode');
      if (saved === 'true' || (saved === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body class="
  bg-gradient-to-br from-slate-900 via-slate-800 to-purple-900
  dark:from-slate-950 dark:via-slate-900 dark:to-purple-950
  min-h-screen flex justify-center
  text-slate-100 font-sans
">

  <div id="app" class="w-full max-w-[430px] flex flex-col min-h-screen relative">

    <!-- HEADER -->
    <header class="
      sticky top-0 z-20
      backdrop-blur-md bg-white/10 border-b border-white/20
      px-4 py-3 flex items-center justify-between
      safe-area-top
    ">
      <div>
        <h1 class="text-base font-bold tracking-tight leading-tight">Knowledge Hub</h1>
        <p class="text-[10px] text-slate-400 leading-none mt-0.5">ナレッジ共有</p>
      </div>
      <button id="darkToggle"
        class="w-9 h-9 rounded-xl backdrop-blur-sm bg-white/10 border border-white/20
               flex items-center justify-center text-base transition-all active:scale-90 select-none"
        aria-label="ダークモード切替">
        <span id="darkIcon">🌙</span>
      </button>
    </header>

    <!-- CONTENT AREA -->
    <main id="contentArea" class="
      flex-1 overflow-y-auto no-scrollbar
      px-4 py-4 pb-28
    ">
      <!-- JS renders here -->
      <div class="flex items-center justify-center h-40">
        <p class="text-slate-400 text-sm">読み込み中...</p>
      </div>
    </main>

    <!-- TAB BAR -->
    <nav class="
      fixed bottom-0 left-1/2 -translate-x-1/2
      w-full max-w-[430px] z-20
      backdrop-blur-md bg-black/40 border-t border-white/15
      flex
    ">
      <button data-tab="new"
        class="tab-btn flex-1 py-3 pb-5 flex flex-col items-center gap-0.5 text-xs font-medium transition-colors select-none">
        <span class="text-xl leading-none">✨</span>
        <span>新着</span>
      </button>
      <button data-tab="genre"
        class="tab-btn flex-1 py-3 pb-5 flex flex-col items-center gap-0.5 text-xs font-medium transition-colors select-none">
        <span class="text-xl leading-none">📂</span>
        <span>ジャンル</span>
      </button>
      <button data-tab="search"
        class="tab-btn flex-1 py-3 pb-5 flex flex-col items-center gap-0.5 text-xs font-medium transition-colors select-none">
        <span class="text-xl leading-none">🔍</span>
        <span>検索</span>
      </button>
    </nav>

  </div>

  <script>
    // ---- 定数 ----
    const GENRE_COLOR = {
      '健康':           'bg-emerald-500/20 text-emerald-300 border-emerald-500/30',
      'AI・技術':       'bg-sky-500/20 text-sky-300 border-sky-500/30',
      '理学療法':       'bg-violet-500/20 text-violet-300 border-violet-500/30',
      '副業・ビジネス': 'bg-amber-500/20 text-amber-300 border-amber-500/30',
      'ライフスタイル': 'bg-rose-500/20 text-rose-300 border-rose-500/30',
    };

    const GENRE_ICON = {
      '健康':           '💪',
      'AI・技術':       '🤖',
      '理学療法':       '🏥',
      '副業・ビジネス': '💼',
      'ライフスタイル': '🌿',
    };

    // ---- 状態 ----
    let allArticles = [];
    let currentTab = 'new';

    // ---- DOM ----
    const contentArea = document.getElementById('contentArea');
    const darkToggle  = document.getElementById('darkToggle');
    const darkIcon    = document.getElementById('darkIcon');
    const tabBtns     = document.querySelectorAll('.tab-btn');

    // ---- 起動 ----
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();
        allArticles = data.articles.sort((a, b) => b.date.localeCompare(a.date));
      } catch (e) {
        contentArea.innerHTML = `
          <div class="text-center text-slate-400 text-sm mt-16">
            <p class="text-3xl mb-3">⚠️</p>
            <p>データの読み込みに失敗しました。</p>
            <p class="text-xs mt-1 text-slate-500">ローカルサーバー経由でアクセスしてください。</p>
          </div>`;
        return;
      }

      initDarkMode();
      initTabs();
      renderNew(allArticles);
      setActiveTab('new');
    });

    // ---- ダークモード ----
    function initDarkMode() {
      updateDarkIcon();
      darkToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('darkMode', isDark);
        updateDarkIcon();
      });
    }

    function updateDarkIcon() {
      darkIcon.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
    }

    // ---- タブ ----
    function initTabs() {
      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          if (tab === currentTab) return;
          currentTab = tab;
          setActiveTab(tab);
          contentArea.scrollTop = 0;

          if (tab === 'new')    renderNew(allArticles);
          if (tab === 'genre')  renderGenre(allArticles);
          if (tab === 'search') renderSearch(allArticles, '');
        });
      });
    }

    function setActiveTab(tab) {
      tabBtns.forEach(btn => {
        const active = btn.dataset.tab === tab;
        btn.classList.toggle('text-white',     active);
        btn.classList.toggle('text-slate-400', !active);
      });
    }

    // ---- カード生成 ----
    function createCard(article, index) {
      const gc = GENRE_COLOR[article.genre] ?? 'bg-slate-500/20 text-slate-300 border-slate-500/30';
      const tagsHTML = article.tags
        .map(t => `<span class="text-[11px] px-2 py-0.5 rounded-full bg-white/10 text-slate-300">#${t}</span>`)
        .join('');

      const card = document.createElement('div');
      card.className = 'float-up backdrop-blur-md bg-white/10 border border-white/20 rounded-2xl p-4 mb-3 transition-transform active:scale-[0.98]';
      card.style.animationDelay = `${index * 60}ms`;

      card.innerHTML = `
        <div class="flex items-start justify-between gap-2 mb-2">
          <h2 class="text-sm font-bold leading-snug flex-1 text-slate-100">${escHtml(article.title)}</h2>
          <span class="text-[11px] px-2 py-0.5 rounded-full border shrink-0 ${gc}">${escHtml(article.genre)}</span>
        </div>
        <p class="text-xs text-slate-300 leading-relaxed mb-3">${escHtml(article.summary)}</p>
        <div class="flex items-end justify-between gap-2">
          <div class="flex flex-wrap gap-1">${tagsHTML}</div>
          <span class="text-[11px] text-slate-400 shrink-0 whitespace-nowrap">📖 ${article.readTime}分 · ${article.date}</span>
        </div>
      `;
      return card;
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ---- 新着タブ ----
    function renderNew(articles) {
      contentArea.innerHTML = '';

      const header = document.createElement('p');
      header.className = 'float-up text-[11px] text-slate-400 mb-3 px-1';
      header.style.animationDelay = '0ms';
      header.textContent = `全 ${articles.length} 件 — 最新順`;
      contentArea.appendChild(header);

      articles.forEach((a, i) => contentArea.appendChild(createCard(a, i + 1)));
    }

    // ---- ジャンルタブ ----
    function renderGenre(articles) {
      contentArea.innerHTML = '';

      const genreMap = {};
      articles.forEach(a => {
        if (!genreMap[a.genre]) genreMap[a.genre] = [];
        genreMap[a.genre].push(a);
      });

      Object.entries(genreMap).forEach(([genre, items], gi) => {
        const gc = GENRE_COLOR[genre] ?? 'bg-slate-500/20 text-slate-300 border-slate-500/30';
        const icon = GENRE_ICON[genre] ?? '📄';

        const wrapper = document.createElement('div');
        wrapper.className = 'float-up mb-3';
        wrapper.style.animationDelay = `${gi * 80}ms`;

        const header = document.createElement('button');
        header.className = 'w-full flex items-center justify-between px-4 py-3.5 backdrop-blur-md bg-white/10 border border-white/20 rounded-2xl text-sm font-bold transition-all active:scale-[0.98]';
        header.innerHTML = `
          <span class="flex items-center gap-2">
            <span class="text-base">${icon}</span>
            <span>${escHtml(genre)}</span>
            <span class="text-[11px] px-2 py-0.5 rounded-full border ${gc}">${items.length}件</span>
          </span>
          <span class="accordion-icon text-slate-400 text-xs transition-transform duration-300">▼</span>
        `;

        const body = document.createElement('div');
        body.className = 'hidden mt-2';

        items.forEach((a, i) => body.appendChild(createCard(a, i)));

        let open = false;
        header.addEventListener('click', () => {
          open = !open;
          body.classList.toggle('hidden', !open);
          header.querySelector('.accordion-icon').style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
          if (open) {
            body.querySelectorAll('.float-up').forEach(el => {
              el.style.animationName = 'none';
              void el.offsetHeight;
              el.style.animationName = '';
            });
          }
        });

        wrapper.appendChild(header);
        wrapper.appendChild(body);
        contentArea.appendChild(wrapper);
      });
    }

    // ---- 検索タブ ----
    function renderSearch(articles, query) {
      contentArea.innerHTML = '';

      const searchBox = document.createElement('div');
      searchBox.className = 'float-up mb-4';
      searchBox.style.animationDelay = '0ms';
      searchBox.innerHTML = `
        <input id="searchInput" type="search"
          placeholder="タイトル・タグ・要約で検索..."
          value="${escHtml(query)}"
          autocomplete="off" autocorrect="off" spellcheck="false"
          class="
            w-full px-4 py-3 rounded-2xl text-sm
            backdrop-blur-md bg-white/10 border border-white/20
            text-slate-100 placeholder:text-slate-400
            outline-none focus:border-purple-400/60 transition-colors
          "
        >
      `;
      contentArea.appendChild(searchBox);

      const resultsArea = document.createElement('div');
      resultsArea.id = 'searchResults';
      contentArea.appendChild(resultsArea);

      const runFilter = (q) => {
        resultsArea.innerHTML = '';
        const lower = q.toLowerCase();
        const filtered = !q ? articles : articles.filter(a =>
          a.title.toLowerCase().includes(lower) ||
          a.summary.toLowerCase().includes(lower) ||
          a.tags.some(t => t.toLowerCase().includes(lower)) ||
          a.genre.toLowerCase().includes(lower)
        );

        if (filtered.length === 0) {
          resultsArea.innerHTML = `
            <div class="text-center text-slate-400 text-sm mt-10">
              <p class="text-3xl mb-2">🔍</p>
              <p>「${escHtml(q)}」に一致する記事が見つかりません</p>
            </div>`;
          return;
        }

        const info = document.createElement('p');
        info.className = 'text-[11px] text-slate-400 mb-3 px-1';
        info.textContent = q ? `${filtered.length} 件ヒット` : `全 ${filtered.length} 件`;
        resultsArea.appendChild(info);

        filtered.forEach((a, i) => resultsArea.appendChild(createCard(a, i)));
      };

      runFilter(query);

      document.getElementById('searchInput').addEventListener('input', e => runFilter(e.target.value));

      if (!query) {
        setTimeout(() => document.getElementById('searchInput')?.focus(), 100);
      }
    }
  </script>

</body>
</html>
