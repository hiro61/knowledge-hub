<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111723">
  <title>Knowledge Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="ambient-sky" aria-hidden="true">
    <div class="ambient-sky__gradient"></div>
    <div class="ambient-sky__glow ambient-sky__glow--one"></div>
    <div class="ambient-sky__glow ambient-sky__glow--two"></div>
    <div class="ambient-sky__cloud ambient-sky__cloud--back"></div>
    <div class="ambient-sky__cloud ambient-sky__cloud--mid"></div>
    <div class="ambient-sky__cloud ambient-sky__cloud--front"></div>
    <div class="ambient-sky__grain"></div>
  </div>

  <div id="authOverlay" class="auth-overlay">
    <div class="auth-panel glass-panel reveal">
      <p class="auth-panel__eyebrow">Private library</p>
      <h1 class="auth-panel__title">Knowledge Hub</h1>
      <p class="auth-panel__text">静かな空気感の中で、記事を読むための個人用アーカイブです。</p>
      <label class="auth-field">
        <span class="visually-hidden">パスワード</span>
        <input id="passInput" type="password" placeholder="パスワードを入力" autocomplete="current-password">
      </label>
      <p id="passError" class="auth-panel__error hidden">パスワードが違います</p>
      <button id="authButton" class="primary-button" type="button">入る</button>
    </div>
  </div>

  <div id="app" class="app-shell hidden">
    <header class="topbar glass-panel">
      <div class="topbar__title-group">
        <p class="topbar__eyebrow">Quiet archive</p>
        <h1 class="topbar__title">Knowledge Hub</h1>
      </div>
      <button id="themeToggle" class="icon-button" type="button" aria-label="表示トーン切替">
        <span id="themeToggleIcon" aria-hidden="true"></span>
      </button>
    </header>

    <main id="contentArea" class="content-area">
      <section class="loading-state glass-panel">
        <p class="loading-state__label">Loading library...</p>
      </section>
    </main>

    <nav class="tab-bar glass-panel" aria-label="Primary navigation">
      <button data-tab="new" class="tab-button is-active" type="button">
        <span class="tab-button__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 6h12"></path>
            <path d="M8 12h12"></path>
            <path d="M8 18h12"></path>
            <path d="M3.5 6h.01"></path>
            <path d="M3.5 12h.01"></path>
            <path d="M3.5 18h.01"></path>
          </svg>
        </span>
        <span class="tab-button__label">新着</span>
      </button>
      <button data-tab="genre" class="tab-button" type="button">
        <span class="tab-button__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1.4"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1.4"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1.4"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1.4"></rect>
          </svg>
        </span>
        <span class="tab-button__label">ジャンル</span>
      </button>
      <button data-tab="search" class="tab-button" type="button">
        <span class="tab-button__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="m16 16 5 5"></path>
          </svg>
        </span>
        <span class="tab-button__label">検索</span>
      </button>
      <button data-tab="favorites" class="tab-button" type="button">
        <span class="tab-button__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20.3 5.7 17V5.8h12.6V17L12 20.3Z"></path>
            <path d="M9 10.5h6"></path>
          </svg>
        </span>
        <span class="tab-button__label">保存</span>
      </button>
    </nav>
  </div>

  <section id="articleViewer" class="article-viewer hidden" aria-hidden="true">
    <div class="article-viewer__backdrop"></div>
    <div class="article-viewer__panel glass-panel">
      <div class="article-viewer__toolbar">
        <button id="closeViewerButton" class="secondary-button" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
          <span>戻る</span>
        </button>
      </div>
      <iframe id="articleFrame" title="Article viewer"></iframe>
    </div>
  </section>

  <noscript>
    <div class="noscript-banner">このアプリの表示には JavaScript が必要です。</div>
  </noscript>

  <script src="./script.js" defer></script>
</body>
</html>
