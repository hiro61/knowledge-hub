<!DOCTYPE html>
<html lang="ja" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Knowledge Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .float-up { animation: floatUp 0.35s ease forwards; opacity: 0; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    * { -webkit-tap-highlight-color: transparent; }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  </style>
  <script>
    /* ライトモードがデフォルト。localStorage に 'true' がある場合のみダークモード */
    (function () {
      if (localStorage.getItem('darkMode') === 'true') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script>
    const PASS_HASH = 'd502cfbb7ece80155d7348b6f76b96b176415eaa08bc85c2ffe96cc42b5a5ff5';
    const SESSION_KEY = 'kh_auth';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function showApp() {
      document.getElementById('authOverlay').remove();
      document.getElementById('app').classList.remove('hidden');
    }

    window.submitPassword = async function () {
      const input = document.getElementById('passInput').value;
      const errEl = document.getElementById('passError');
      if (!input) return;
      const hash = await sha256(input);
      if (hash === PASS_HASH) {
        sessionStorage.setItem(SESSION_KEY, '1');
        showApp();
      } else {
        errEl.classList.remove('hidden');
        document.getElementById('passInput').value = '';
        document.getElementById('passInput').focus();
        setTimeout(() => errEl.classList.add('hidden'), 2500);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem(SESSION_KEY) === '1') showApp();
      document.getElementById('passInput')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') window.submitPassword();
      });
    });
  </script>
</head>

<body class="bg-[#f7f6f3] dark:bg-stone-950 min-h-screen flex justify-center text-stone-900 dark:text-stone-100">

  <!-- パスワードゲート -->
  <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center px-6 bg-[#f7f6f3] dark:bg-stone-950">
    <div class="w-full max-w-[320px] float-up">
      <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-2xl p-8 text-center shadow-sm">
        <p class="text-3xl mb-4">☕</p>
        <h1 class="text-base font-semibold text-stone-900 dark:text-stone-100 mb-1">Knowledge Hub</h1>
        <p class="text-xs text-stone-400 mb-6">パスワードを入力してください</p>
        <input id="passInput" type="password" placeholder="パスワード"
          autocomplete="current-password"
          class="w-full px-4 py-2.5 rounded-lg text-sm text-center bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-600 text-stone-900 dark:text-stone-100 placeholder:text-stone-300 dark:placeholder:text-stone-500 outline-none focus:border-stone-400 dark:focus:border-stone-400 transition-colors mb-3"
        >
        <p id="passError" class="hidden text-xs text-red-400 mb-3">パスワードが違います</p>
        <button onclick="submitPassword()"
          class="w-full py-2.5 rounded-lg text-sm font-medium bg-stone-900 dark:bg-stone-100 hover:bg-stone-700 dark:hover:bg-stone-300 text-white dark:text-stone-900 transition-colors">
          入る
        </button>
      </div>
    </div>
  </div>

  <div id="app" class="hidden w-full max-w-[430px] flex flex-col min-h-screen">

    <!-- HEADER -->
    <header class="sticky top-0 z-20 bg-white/90 dark:bg-stone-900/90 backdrop-blur-sm border-b border-stone-200 dark:border-stone-700 px-4 py-3 flex items-center justify-between">
      <div>
        <h1 class="text-sm font-semibold text-stone-900 dark:text-stone-100 leading-tight">Knowledge Hub</h1>
        <p class="text-[10px] text-stone-400 leading-none mt-0.5">ナレッジ共有</p>
      </div>
      <button id="darkToggle"
        class="w-8 h-8 rounded-lg bg-stone-100 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 flex items-center justify-center text-sm transition-colors select-none"
        aria-label="ダークモード切替">
        <span id="darkIcon">🌙</span>
      </button>
    </header>

    <!-- CONTENT AREA -->
    <main id="contentArea" class="flex-1 overflow-y-auto no-scrollbar px-4 py-4 pb-24">
      <div class="flex items-center justify-center h-40">
        <p class="text-stone-400 text-sm">読み込み中...</p>
      </div>
    </main>

    <!-- TAB BAR -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-20 bg-white/90 dark:bg-stone-900/90 backdrop-blur-sm border-t border-stone-200 dark:border-stone-700 flex">
      <button data-tab="new"    class="tab-btn flex-1 py-3 pb-5 flex flex-col items-center gap-1 text-xs font-medium transition-colors select-none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
        <span>新着</span>
      </button>
      <button data-tab="genre"  class="tab-btn flex-1 py-3 pb-5 flex flex-col items-center gap-1 text-xs font-medium transition-colors select-none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>ジャンル</span>
      </button>
      <button data-tab="search" class="tab-btn flex-1 py-3 pb-5 flex flex-col items-center gap-1 text-xs font-medium transition-colors select-none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <span>検索</span>
      </button>
    </nav>

    <!-- ARTICLE VIEWER -->
    <div id="articleViewer" class="hidden fixed inset-0 z-30 flex justify-center">
      <div class="w-full max-w-[430px] flex flex-col bg-white dark:bg-stone-900">
        <div class="flex items-center px-3 py-3 border-b border-stone-200 dark:border-stone-700 bg-white/90 dark:bg-stone-900/90 backdrop-blur-sm shrink-0">
          <button onclick="closeArticle()" class="flex items-center gap-1.5 text-sm font-medium text-stone-600 dark:text-stone-300 active:opacity-50 transition-opacity px-1 py-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>戻る</span>
          </button>
        </div>
        <iframe id="articleFrame" src="" class="flex-1 w-full border-0"></iframe>
      </div>
    </div>

  </div>

  <script>
    const GENRE_COLOR = {
      '健康':           'bg-emerald-50 text-emerald-700 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-700',
      'AI・技術':       'bg-sky-50 text-sky-700 border-sky-200 dark:bg-sky-900/30 dark:text-sky-400 dark:border-sky-700',
      '理学療法':       'bg-violet-50 text-violet-700 border-violet-200 dark:bg-violet-900/30 dark:text-violet-400 dark:border-violet-700',
      '副業・ビジネス': 'bg-amber-50 text-amber-700 border-amber-200 dark:bg-amber-900/30 dark:text-amber-400 dark:border-amber-700',
      'ライフスタイル': 'bg-rose-50 text-rose-700 border-rose-200 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-700',
    };

    const GENRE_ICON = {
      '健康': `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 21s-6.5-4.35-9-8.17C1 9.72 2.7 6 6.64 6c2.17 0 3.4 1.18 4.14 2.4C11.52 7.18 12.75 6 14.92 6 18.86 6 20.56 9.72 18.5 12.83 16 16.65 12 21 12 21Z"/>
        </svg>`,
      'AI・技術': `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="7" y="7" width="10" height="10" rx="2"/>
          <path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3"/>
        </svg>`,
      '理学療法': `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 4v16M4 12h16"/>
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>`,
      '副業・ビジネス': `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 8h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8Z"/>
          <path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>`,
      'ライフスタイル': `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 20c6 0 12-5 12-14-6 0-12 5-12 14Z"/>
          <path d="M8.5 15.5c2-1.7 4-3 7-4.5"/>
        </svg>`,
    };

    let allArticles = [];
    let currentTab = 'new';

    const contentArea = document.getElementById('contentArea');
    const tabBtns     = document.querySelectorAll('.tab-btn');

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error();
        const data = await res.json();
        allArticles = data.articles.sort((a, b) => b.date.localeCompare(a.date));
      } catch {
        contentArea.innerHTML = `<div class="text-center text-stone-400 text-sm mt-16"><p class="text-3xl mb-3">⚠️</p><p>データの読み込みに失敗しました。</p><p class="text-xs mt-1 text-stone-300">ローカルサーバー経由でアクセスしてください。</p></div>`;
        return;
      }
      initDarkMode();
      initTabs();
      renderNew(allArticles);
      setActiveTab('new');
    });

    function initDarkMode() {
      updateDarkIcon();
      document.getElementById('darkToggle').addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('darkMode', isDark);
        updateDarkIcon();
      });
    }

    function updateDarkIcon() {
      document.getElementById('darkIcon').textContent =
        document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
    }

    function initTabs() {
      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          if (tab === currentTab) return;
          currentTab = tab;
          setActiveTab(tab);
          contentArea.scrollTop = 0;
          if (tab === 'new')    renderNew(allArticles);
          if (tab === 'genre')  renderGenre(allArticles);
          if (tab === 'search') renderSearch(allArticles, '');
        });
      });
    }

    function setActiveTab(tab) {
      tabBtns.forEach(btn => {
        const active = btn.dataset.tab === tab;
        btn.classList.toggle('text-stone-900',  active);
        btn.classList.toggle('dark:text-stone-100', active);
        btn.classList.toggle('text-stone-400',  !active);
        btn.classList.toggle('dark:text-stone-500', !active);
      });
    }

    function openArticle(article) {
      document.getElementById('articleFrame').src = article.file;
      document.getElementById('articleViewer').classList.remove('hidden');
    }

    function closeArticle() {
      document.getElementById('articleViewer').classList.add('hidden');
      document.getElementById('articleFrame').src = '';
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function createCard(article, index) {
      const gc = GENRE_COLOR[article.genre] ?? 'bg-stone-50 text-stone-600 border-stone-200';
      const tagsHTML = article.tags
        .map(t => `<span class="text-[10px] px-2 py-0.5 rounded-full bg-stone-100 dark:bg-stone-700 text-stone-500 dark:text-stone-400">#${escHtml(t)}</span>`)
        .join('');
      const hasFile = !!article.file;

      const outer = document.createElement('div');
      if (hasFile) {
        outer.addEventListener('click', () => openArticle(article));
      }
      outer.className = [
        'float-up block',
        'bg-white dark:bg-stone-800',
        'border border-stone-200 dark:border-stone-700',
        'rounded-xl p-4 mb-3',
        hasFile
          ? 'hover:border-stone-300 dark:hover:border-stone-600 hover:shadow-sm cursor-pointer transition-all active:scale-[0.99]'
          : 'cursor-default',
      ].join(' ');
      outer.style.animationDelay = `${index * 55}ms`;

      outer.innerHTML = `
        <div class="flex items-start justify-between gap-2 mb-2">
          <p class="text-sm font-semibold leading-snug flex-1 text-stone-900 dark:text-stone-100">${escHtml(article.title)}</p>
          <span class="text-[10px] px-2 py-0.5 rounded-full border shrink-0 ${gc}">${escHtml(article.genre)}</span>
        </div>
        <p class="text-xs text-stone-500 dark:text-stone-400 leading-relaxed mb-3">${escHtml(article.summary)}</p>
        <div class="flex items-end justify-between gap-2">
          <div class="flex flex-wrap gap-1">${tagsHTML}</div>
          <div class="flex items-center gap-2 shrink-0">
            <span class="text-[10px] text-stone-400 whitespace-nowrap">${article.readTime}分 · ${article.date}</span>
            ${hasFile ? `<span class="text-[10px] text-stone-400 font-medium">読む →</span>` : ''}
          </div>
        </div>
      `;
      return outer;
    }

    /* ---- 新着タブ ---- */
    function renderNew(articles) {
      contentArea.innerHTML = '';
      const info = document.createElement('p');
      info.className = 'float-up text-[11px] text-stone-400 mb-3 px-1';
      info.style.animationDelay = '0ms';
      info.textContent = `全 ${articles.length} 件 — 最新順`;
      contentArea.appendChild(info);
      articles.forEach((a, i) => contentArea.appendChild(createCard(a, i + 1)));
    }

    /* ---- ジャンルタブ ---- */
    function renderGenre(articles) {
      contentArea.innerHTML = '';
      const genreMap = {};
      articles.forEach(a => { if (!genreMap[a.genre]) genreMap[a.genre] = []; genreMap[a.genre].push(a); });

      Object.entries(genreMap).forEach(([genre, items], gi) => {
        const gc = GENRE_COLOR[genre] ?? 'bg-stone-50 text-stone-600 border-stone-200';
        const icon = GENRE_ICON[genre] ?? `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3h6l5 5v13H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/>
            <path d="M14 3v5h5"/>
          </svg>`;
        const wrapper = document.createElement('div');
        wrapper.className = 'float-up mb-2';
        wrapper.style.animationDelay = `${gi * 70}ms`;

        const btn = document.createElement('button');
        btn.className = 'w-full flex items-center justify-between px-4 py-3 bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-xl text-sm font-medium transition-all hover:border-stone-300 dark:hover:border-stone-600 active:scale-[0.99]';
        btn.innerHTML = `
          <span class="flex items-center gap-2">
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-stone-100 text-stone-600 dark:bg-stone-700/70 dark:text-stone-200">${icon}</span>
            <span class="text-stone-900 dark:text-stone-100">${escHtml(genre)}</span>
            <span class="text-[10px] px-2 py-0.5 rounded-full border ${gc}">${items.length}件</span>
          </span>
          <span class="accordion-icon text-stone-400 text-xs transition-transform duration-200">▼</span>
        `;

        const body = document.createElement('div');
        body.className = 'hidden pt-2 pl-2';
        items.forEach((a, i) => body.appendChild(createCard(a, i)));

        let open = false;
        btn.addEventListener('click', () => {
          open = !open;
          body.classList.toggle('hidden', !open);
          btn.querySelector('.accordion-icon').style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
          if (open) {
            body.querySelectorAll('.float-up').forEach(el => {
              el.style.animationName = 'none';
              void el.offsetHeight;
              el.style.animationName = '';
            });
          }
        });

        wrapper.appendChild(btn);
        wrapper.appendChild(body);
        contentArea.appendChild(wrapper);
      });
    }

    /* ---- 検索タブ ---- */
    function renderSearch(articles, query) {
      contentArea.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'float-up mb-4';
      box.innerHTML = `
        <input id="searchInput" type="search" placeholder="タイトル・タグ・要約で検索..."
          value="${escHtml(query)}" autocomplete="off" autocorrect="off" spellcheck="false"
          class="w-full px-4 py-2.5 rounded-xl text-sm bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-700 text-stone-900 dark:text-stone-100 placeholder:text-stone-300 dark:placeholder:text-stone-500 outline-none focus:border-stone-400 dark:focus:border-stone-500 transition-colors">
      `;
      contentArea.appendChild(box);

      const results = document.createElement('div');
      results.id = 'searchResults';
      contentArea.appendChild(results);

      const run = (q) => {
        results.innerHTML = '';
        const lower = q.toLowerCase();
        const filtered = !q ? articles : articles.filter(a =>
          a.title.toLowerCase().includes(lower) ||
          a.summary.toLowerCase().includes(lower) ||
          a.tags.some(t => t.toLowerCase().includes(lower)) ||
          a.genre.toLowerCase().includes(lower)
        );
        if (!filtered.length) {
          results.innerHTML = `<div class="text-center text-stone-400 text-sm mt-10"><p class="text-2xl mb-2">🔍</p><p>「${escHtml(q)}」に一致する記事がありません</p></div>`;
          return;
        }
        const info = document.createElement('p');
        info.className = 'text-[11px] text-stone-400 mb-3 px-1';
        info.textContent = q ? `${filtered.length} 件ヒット` : `全 ${filtered.length} 件`;
        results.appendChild(info);
        filtered.forEach((a, i) => results.appendChild(createCard(a, i)));
      };

      run(query);
      document.getElementById('searchInput').addEventListener('input', e => run(e.target.value));
      if (!query) setTimeout(() => document.getElementById('searchInput')?.focus(), 100);
    }
  </script>

</body>
</html>
