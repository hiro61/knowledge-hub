<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0d18">
  <title>Knowledge Hub</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0a0d18;
      color: #cfd6e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
    }
    .boot {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.04em;
      opacity: 0.7;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="boot">Loading…</div>
  <script>
    (async function bootstrap() {
      const FALLBACK = "part2";
      const ALLOWED = /^[a-z0-9_-]+$/i;

      // URL query overrides the configured default for preview purposes.
      const urlParam = new URLSearchParams(window.location.search).get("design");
      if (urlParam && ALLOWED.test(urlParam)) {
        window.location.replace("designs/" + urlParam + "/");
        return;
      }

      let active = FALLBACK;
      try {
        const res = await fetch("./design-config.json", { cache: "no-store" });
        if (res.ok) {
          const cfg = await res.json();
          if (typeof cfg.active === "string" && ALLOWED.test(cfg.active)) {
            active = cfg.active;
          }
        }
      } catch (_) {
        // ignore — fall back to default
      }
      window.location.replace("designs/" + active + "/");
    })();
  </script>
</body>
</html>
